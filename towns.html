<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style/style-towns.css" rel="stylesheet">
    <title>Earthmc 信息查询工具 城镇查询</title>
</head>
<body>
    <header>
        <h1>Earthmc 信息查询工具</h1>
    </header>
    <nav id="mainNav">
        <a href="index.html">首页</a>
        <a href="players.html">玩家查询</a>
        <a id="selected" href="towns.html">城镇查询</a>
        <a href="nations.html">国家查询</a>
    </nav>
    <main>
    <div id="mainArea">
        <nav id="searchNav">
            <button id="listAll" onclick="searchAll()">查询服务器所有城镇列表</button>
            <input id="townName" type="text" placeholder="输入要单独查询的城镇名称或者uuid" autocomplete="off">
            <button id="searchButton" onclick="search()">查询城镇具体信息喵!!!</button>
        </nav>
        <table id="townList">
            <thead>
                <tr>
                    <th>城镇名称(点击查询具体信息)</th>
                    <th>城镇uuid</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>
    </div>
    </main>
    <footer>
        <p>by 1stikun,Github:<a href="https://github.com/ncnjn123/">ncnjn123</a></p>
    </footer>
    <script src="javascript/js-towns.js"></script>
</body>
</html>
