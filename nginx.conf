worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       C:/Users/Ethan/AppData/Local/Microsoft/WinGet/Packages/nginxinc.nginx_Microsoft.Winget.Source_8wekyb3d8bbwe/nginx-1.29.8/conf/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # EMC 信息查询工具
    server {
        listen       80;
        server_name  localhost;
        
        # 前端静态文件
        location / {
            root D:/emc;
            index index.html;
            try_files $uri $uri/ =404;
        }
        
        # EarthMC API 反向代理 - 解决 CORS
        location /api/ {
            proxy_pass https://api.earthmc.net/;
            proxy_ssl_server_name on;
            proxy_set_header Host api.earthmc.net;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS 头
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            
            # 处理预检请求
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, Authorization";
                add_header Content-Length 0;
                return 204;
            }
        }
        
        error_log D:/emc/logs/nginx-error.log;
        access_log D:/emc/logs/nginx-access.log;
    }
}
